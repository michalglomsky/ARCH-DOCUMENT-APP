version: 1

# Rendering DPI for OCR. Higher DPI improves OCR but is slower.
render_dpi: 250

# EasyOCR languages. For Polish documents, "pl" is usually the right start.
ocr_langs: ["pl"]

# If true, also attempt to detect rotation and rotate the OCR image.
# (Currently a simple heuristic; leave false unless needed.)
auto_rotate_ocr_image: false

# Redaction appearance (fill color). Black is typical.
redaction_fill_rgb: [0, 0, 0]

# Output settings
output_suffix: ".redacted"

# Page type detection and redaction rules.
#
# Coordinate conventions:
# - PDF coordinates are in points with origin at TOP-LEFT in this tool’s internal model.
#   (We convert from PyMuPDF’s default bottom-left internally.)
# - Relative rectangles are defined in the same TOP-LEFT coordinate space as the OCR image mapping.
#
# Rule types:
# - anchor_redactions:
#     Find an anchor text bounding box via OCR (regex match),
#     then add rectangles relative to that anchor box.
# - fixed_redactions:
#     Always redact specific rectangles (fallback for stable layouts).
#
# Each page is classified by scanning OCR text for "match_any" patterns.
page_types:
  - name: "wniosek_main"
    match_any:
      - "(?i)wniosek"
      - "(?i)ustalenie\\s+warunk[oó]w\\s+zabudowy"
    anchor_redactions:
      # Example: redact the block to the right/below the "Wnioskodawca" label.
      - anchor_regex: "(?i)wnioskodawca"
        # Multiple rectangles can be applied relative to the anchor text box.
        rects:
          # dx, dy, w, h are in PDF points after mapping (roughly).
          # Tune these based on your form template.
          - { dx: 0, dy: 10, w: 520, h: 120, note: "Redact applicant block under 'Wnioskodawca'." }

      # Example: redact PESEL field if label exists.
      - anchor_regex: "(?i)pesel"
        rects:
          - { dx: 40, dy: -5, w: 250, h: 25, note: "Redact PESEL value next to label." }

      # Example: redact phone/email labels.
      - anchor_regex: "(?i)telefon|tel\\.|e-?mail"
        rects:
          - { dx: 80, dy: -5, w: 320, h: 25, note: "Redact contact value." }

    fixed_redactions: []

  - name: "zalacznik_A_media"
    match_any:
      - "(?i)za[łl]a[ąa]cznik\\s*A"
      - "(?i)infrastruktura\\s+techniczna"
      - "(?i)media"
    anchor_redactions:
      - anchor_regex: "(?i)woda|pr[aą]d|gaz|ciep[łl]o|[śs]cieki"
        rects:
          - { dx: 60, dy: -5, w: 460, h: 28, note: "Optionally redact media provider/location text." }
    fixed_redactions: []

  - name: "zalacznik_B_architektura"
    match_any:
      - "(?i)za[łl]a[ąa]cznik\\s*B"
      - "(?i)B\\.4"
      - "(?i)B\\.5"
      - "(?i)parametry\\s+architektoniczne"
    anchor_redactions:
      # Example: redact signatures if a typical label exists.
      - anchor_regex: "(?i)podpis"
        rects:
          - { dx: 0, dy: 10, w: 520, h: 140, note: "Redact signature area below 'podpis'." }
    fixed_redactions: []

  - name: "fallback_unknown"
    match_any: []
    anchor_redactions: []
    fixed_redactions: []

